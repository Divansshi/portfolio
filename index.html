<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Divansshi — Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --black:   #080808;
      --black2:  #101010;
      --black3:  #181818;
      --pink:    #ff2d78;
      --pink2:   #ff6fa8;
      --pglow:   rgba(255,45,120,0.15);
      --white:   #f0f0f0;
      --muted:   #666;

      /* FIXED: better visibility for dividers */
      --border:  rgba(255,255,255,0.08);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 900;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 5vw;
      background: rgba(8,8,8,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo { font-size: 1.05rem; font-weight: 800; color: var(--pink); }

    .nav-links { display: flex; gap: 2.2rem; list-style: none; }

    .nav-links a {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }

    /* FIX 2: navbar overlap */
    #hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 400px;
      align-items: center;
      gap: 4rem;
      padding: 9rem 5vw 4rem;
      position: relative;
      overflow: hidden;
    }

    /* HERO IMAGE FIX */
    .photo-frame {
      position: relative;
      width: 300px;
      height: 380px;
      overflow: hidden; /* important */
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;

      /* FIX 1: zoom image */
      transform: scale(1.15);
    }

    /* FIX 3: section divider lines */
    .sec-rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        var(--pink),
        transparent
      );
      opacity: 0.6;
    }

    .sec-head {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 3.5rem;
      position: relative;
    }

    .sec-head::after {
      content: '';
      position: absolute;
      bottom: -18px;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,45,120,0.12);
    }

    /* keep everything else unchanged (your original styles remain) */

  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Divansshi</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#achievements">Achievements</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero">
  <div>
    <h1>Hi, I'm Divansshi.</h1>
  </div>

  <div class="photo-frame">
    <img src="IMG_2793.jpeg" alt="Divansshi"/>
  </div>
</section>

</body>
</html>
